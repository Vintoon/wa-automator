<!DOCTYPE html>
<html>
<head>
  <title>WA Automator Pro</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .box { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; }
    button { padding: 10px 15px; margin-top: 10px; cursor: pointer; }
    .contact { display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; }
    .danger { background:red; color:white; border:none; }
    .green { background:green; color:white; border:none; }
  </style>
</head>
<body>

<h2>WhatsApp Automator Pro</h2>

<div class="box">
  <h3>Message</h3>
  <textarea id="message" rows="6"></textarea>
  <button class="green" onclick="saveMessage()">Save Message</button>
</div>

<div class="box">
  <h3>Add Contact</h3>
  <input id="name" placeholder="Name">
  <input id="number" placeholder="2547XXXXXXXX">
  <button class="green" onclick="addContact()">Add</button>
</div>

<div class="box">
  <h3>Contacts</h3>
  <div id="contacts"></div>
</div>

<div class="box">
  <h3>Actions</h3>
  <button class="green" onclick="sendNow()">Send Now</button>
</div>

<script>
async function load() {
  const cfg = await (await fetch('/api/config')).json();
  document.getElementById('message').value = cfg.message;

  const targets = await (await fetch('/api/targets')).json();

  const box = document.getElementById('contacts');
  box.innerHTML = "";

  targets.forEach(t => {
    const div = document.createElement('div');
    div.className = "contact";
    div.innerHTML = `
      <span>${t.name} (${t.wid})</span>
      <button class="danger" onclick="del(${t.id})">X</button>
    `;
    box.appendChild(div);
  });
}

async function saveMessage() {
  await fetch('/api/config', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      message: document.getElementById('message').value
    })
  });
  alert("Saved");
}

async function addContact() {
  const name = document.getElementById('name').value;
  const number = document.getElementById('number').value;

  await fetch('/api/targets', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      wid: number + "@c.us"
    })
  });

  document.getElementById('name').value = "";
  document.getElementById('number').value = "";
  load();
}

async function del(id) {
  await fetch('/api/targets/' + id, { method: 'DELETE' });
  load();
}

async function sendNow() {
  const res = await fetch('/api/send', { method:'POST' });
  const data = await res.json();
  alert(JSON.stringify(data, null, 2));
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
